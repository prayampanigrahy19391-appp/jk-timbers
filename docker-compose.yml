version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jk-timbers-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: jk_timbers
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jk-network

  redis:
    image: redis:7-alpine
    container_name: jk-timbers-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jk-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jk-timbers-web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/jk_timbers?schema=public
      - REDIS_URL=redis://redis:6379/0
      - NODE_ENV=production
      - AUTH_SECRET=someSuperLongSecretValueThatIsSecureForNextAuth
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jk-network

volumes:
  postgres_data:
  redis_data:

networks:
  jk-network:
    driver: bridge
